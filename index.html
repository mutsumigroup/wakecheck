<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>出発確認アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#0d1b2a;
  --navy2:#1b2d42;
  --navy3:#243550;
  --border:#2e4060;
  --accent:#3b82f6;
  --accent2:#60a5fa;
  --green:#22c55e;
  --yellow:#f59e0b;
  --red:#ef4444;
  --text:#e8edf5;
  --muted:#7a8fa6;
  --white:#ffffff;
}
html,body{height:100%;background:var(--navy);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden;}

/* ===== 認証画面 ===== */
#pageAuth{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;background:linear-gradient(160deg,#0d1b2a 0%,#162236 50%,#0d1b2a 100%);
}
.auth-logo{font-size:28px;font-weight:900;letter-spacing:-0.5px;color:var(--white);margin-bottom:4px;}
.auth-logo span{color:var(--accent2);}
.auth-sub{font-size:12px;color:var(--muted);margin-bottom:40px;}
.auth-card{width:100%;max-width:360px;background:var(--navy2);border:1px solid var(--border);border-radius:16px;padding:28px 24px;}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--navy3);border-radius:10px;padding:3px;}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:.2s;}
.auth-tab.on{background:var(--accent);color:#fff;}
.auth-form{display:flex;flex-direction:column;gap:12px;}
.auth-form input{background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:.2s;}
.auth-form input:focus{border-color:var(--accent);}
.auth-form input::placeholder{color:var(--muted);}
.btn-auth{padding:14px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;}
.btn-auth:active{opacity:.85;}
.role-select{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.role-btn{padding:14px 8px;background:var(--navy3);border:2px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;transition:.2s;}
.role-btn.on{border-color:var(--accent);background:rgba(59,130,246,.1);}
.role-btn-icon{font-size:22px;margin-bottom:4px;}
.role-btn-label{font-size:12px;font-weight:700;color:var(--text);}
.role-btn-desc{font-size:10px;color:var(--muted);margin-top:2px;}

/* ===== メイン ===== */
#pageMain{display:none;flex-direction:column;height:100vh;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;background:var(--navy2);border-bottom:1px solid var(--border);flex-shrink:0;}
.hdr-logo{font-size:18px;font-weight:900;color:var(--white);}
.hdr-logo span{color:var(--accent2);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;border:2px solid var(--accent2);}
.hdr-name{font-size:12px;color:var(--muted);}

/* ===== コンテンツ ===== */
.body{flex:1;overflow-y:auto;padding-bottom:70px;}
.tab-content{display:none;}
.tab-content.on{display:block;}

/* ===== ボトムナビ ===== */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--navy2);border-top:1px solid var(--border);display:flex;padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom,0px));z-index:50;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:600;border:none;background:transparent;padding:4px 0;position:relative;}
.nb.on{color:var(--accent2);}
.nb-icon{font-size:20px;line-height:1;}
.nb-badge{position:absolute;top:0;right:calc(50% - 18px);min-width:16px;height:16px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

/* ===== セクション ===== */
.sec{font-size:12px;font-weight:700;color:var(--muted);padding:16px 16px 6px;letter-spacing:.5px;text-transform:uppercase;}
.card{background:var(--navy2);border:1px solid var(--border);border-radius:14px;margin:0 12px 10px;overflow:hidden;}
.card-pad{padding:16px;}

/* ===== カレンダー ===== */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;}
.cal-nav{background:transparent;border:none;color:var(--accent2);font-size:18px;cursor:pointer;padding:4px 8px;}
.cal-title{font-size:15px;font-weight:700;}
.cal-views{display:flex;gap:4px;padding:0 12px 10px;}
.cal-view{flex:1;padding:7px;text-align:center;font-size:11px;font-weight:700;border-radius:8px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;transition:.2s;}
.cal-view.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:40px;gap:2px;padding:0 12px 12px;}
.cal-day-label{text-align:center;font-size:10px;color:var(--muted);padding:4px 0;height:auto!important;}
.cal-day{text-align:center;padding:0;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;transition:.2s;position:relative;display:flex;align-items:center;justify-content:center;height:40px;}
.cal-day:hover{background:var(--navy3);}
.cal-day.today{background:rgba(59,130,246,.15);color:var(--accent2);font-weight:700;}
.cal-day.selected{background:var(--accent);color:#fff;font-weight:700;}
.cal-day.has-plan::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--yellow);}
.cal-day.other{color:var(--muted);}
.cal-day.empty{cursor:default;}
.week-list{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px;}
.week-day{padding:12px;background:var(--navy3);border-radius:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.2s;}
.week-day:active{opacity:.7;}
.week-day-date{text-align:center;min-width:40px;}
.week-day-num{font-size:20px;font-weight:700;}
.week-day-label{font-size:10px;color:var(--muted);}
.week-day-info{flex:1;}
.week-day-plans{font-size:12px;color:var(--muted);}

/* ===== 出発設定モーダル ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.on{display:flex;}
.modal{background:var(--navy2);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}
.form-label{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.form-group{margin-bottom:16px;}
.time-input{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:24px;font-weight:700;text-align:center;outline:none;font-family:inherit;}
.time-input:focus{border-color:var(--accent);}
.member-check-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;}
.member-check{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--navy3);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:.2s;}
.member-check.on{border-color:var(--accent);background:rgba(59,130,246,.08);}
.member-check input{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;}
.member-check-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.member-check-name{font-size:14px;font-weight:600;}
.member-check-user{font-size:11px;color:var(--muted);}
.btn-primary{width:100%;padding:14px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
.btn-secondary{width:100%;padding:13px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:14px;cursor:pointer;font-family:inherit;}

/* ===== チャット画面 ===== */
.chat-list{display:flex;flex-direction:column;}
.chat-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.2s;}
.chat-item:active{background:var(--navy3);}
.chat-avatar{width:46px;height:46px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;position:relative;}
.chat-avatar-badge{position:absolute;bottom:0;right:0;width:12px;height:12px;border-radius:50%;border:2px solid var(--navy2);}
.chat-info{flex:1;min-width:0;}
.chat-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.chat-preview{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-meta{text-align:right;flex-shrink:0;}
.chat-time{font-size:11px;color:var(--muted);margin-bottom:4px;}
.chat-badge{min-width:18px;height:18px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px;}

/* ===== チャット詳細 ===== */
#chatDetail{position:fixed;inset:0;background:var(--navy);z-index:80;display:none;flex-direction:column;}
.chat-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--navy2);border-bottom:1px solid var(--border);flex-shrink:0;}
.chat-hdr-back{background:transparent;border:none;color:var(--accent2);font-size:20px;cursor:pointer;padding:4px;}
.chat-hdr-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.chat-hdr-name{font-size:15px;font-weight:700;}
.chat-hdr-status{font-size:11px;color:var(--muted);}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 12px;display:flex;flex-direction:column;gap:8px;}
.msg-row{display:flex;align-items:flex-end;gap:6px;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.msg-bubble{max-width:72%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;}
.msg-bubble.theirs{background:var(--navy2);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg-bubble.mine{background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
.msg-bubble.system{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--yellow);font-size:12px;text-align:center;border-radius:10px;max-width:90%;}
.msg-time{font-size:10px;color:var(--muted);white-space:nowrap;}
.msg-row.system-row{justify-content:center;}
/* 出発カード */
.departure-card{background:var(--navy3);border:1px solid var(--border);border-radius:12px;padding:14px;margin:4px 0;}
.departure-card.pending{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.06);}
.departure-card.done{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06);}
.departure-card.missed{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.06);}
.dc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.dc-title{font-size:12px;font-weight:700;color:var(--muted);}
.dc-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:100px;}
.dc-status.pending{background:rgba(245,158,11,.2);color:var(--yellow);}
.dc-status.done{background:rgba(34,197,94,.2);color:var(--green);}
.dc-status.missed{background:rgba(239,68,68,.2);color:var(--red);}
.dc-time{font-size:26px;font-weight:900;color:var(--text);margin-bottom:4px;}
.dc-date{font-size:12px;color:var(--muted);}
.dc-action{margin-top:10px;}
.btn-depart{width:100%;padding:11px;background:var(--green);border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-depart:disabled{background:var(--border);color:var(--muted);cursor:default;}
/* 入力欄 */
.chat-input-area{padding:8px 12px;background:var(--navy2);border-top:1px solid var(--border);padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));flex-shrink:0;}
.chat-input-row{display:flex;gap:8px;align-items:flex-end;}
.chat-input{flex:1;background:var(--navy3);border:1px solid var(--border);border-radius:20px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;resize:none;max-height:100px;line-height:1.4;}
.chat-input:focus{border-color:var(--accent);}
.btn-send{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ===== 設定画面 ===== */
.settings-section{margin:0 12px 12px;}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--navy2);border:1px solid var(--border);}
.settings-item:first-child{border-radius:12px 12px 0 0;}
.settings-item:last-child{border-radius:0 0 12px 12px;border-top-color:transparent;}
.settings-item:only-child{border-radius:12px;}
.settings-item+.settings-item{border-top-color:transparent;}
.settings-label{font-size:14px;font-weight:500;}
.settings-value{font-size:13px;color:var(--muted);}
.settings-input{background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;min-width:160px;}
.settings-input:focus{border-color:var(--accent);}
.settings-select{background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}

/* ===== トースト ===== */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(30,50,80,.97);color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;border:1px solid var(--border);}
#toast.on{opacity:1;}

/* ===== アラームオーバーレイ ===== */
.alarm-ov{position:fixed;inset:0;background:rgba(10,15,25,.97);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;animation:flashBg 1s infinite;}
.alarm-ov.on{display:flex;}
@keyframes flashBg{0%,100%{background:rgba(10,15,25,.97)}50%{background:rgba(40,10,10,.99)}}
.alarm-icon{font-size:72px;animation:shake .4s infinite;margin-bottom:12px;}
@keyframes shake{0%,100%{transform:rotate(-10deg) scale(1)}50%{transform:rotate(10deg) scale(1.15)}}
.alarm-label{font-size:12px;color:var(--red);font-weight:700;letter-spacing:2px;margin-bottom:8px;}
.alarm-name{font-size:22px;font-weight:800;color:var(--text);text-align:center;margin-bottom:6px;}
.alarm-desc{font-size:14px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.6;}
.alarm-btns{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;}
.alarm-btn{padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.alarm-btn.red{background:var(--red);color:#fff;}
.alarm-btn.blue{background:var(--accent);color:#fff;}
.alarm-btn.gray{background:var(--navy3);color:var(--muted);border:1px solid var(--border);}

/* ===== Empty ===== */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5;}
.empty-text{font-size:14px;text-align:center;}

/* ===== その他 ===== */
.divider{height:1px;background:var(--border);margin:0 16px;}
</style>
</head>
<body>

<!-- 認証画面 -->
<div id="pageAuth">
  <div class="auth-logo">出発<span>確認</span></div>
  <div class="auth-sub">遅刻・寝坊を事前に防ぐ</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab on" onclick="switchAuth('login')">ログイン</button>
      <button class="auth-tab" onclick="switchAuth('reg')">新規登録</button>
    </div>
    <!-- ログイン -->
    <div id="fLogin">
      <div class="auth-form">
        <input id="lEmail" type="email" placeholder="メールアドレス" autocomplete="email">
        <input id="lPw" type="password" placeholder="パスワード" autocomplete="current-password">
        <button class="btn-auth" onclick="doLogin()">ログイン</button>
      </div>
    </div>
    <!-- 登録 -->
    <div id="fReg" style="display:none;">
      <div class="auth-form">
        <input id="rName" type="text" placeholder="名前（例：田中 太郎）">
        <input id="rUser" type="text" placeholder="ユーザー名（例：tanaka）">
        <input id="rEmail2" type="email" placeholder="メールアドレス">
        <input id="rPw2" type="password" placeholder="パスワード（6文字以上）">
        <button class="btn-auth" onclick="doReg()">アカウントを作成</button>
      </div>
    </div>
  </div>
</div>

<!-- メイン画面 -->
<div id="pageMain">
  <div class="hdr">
    <div class="hdr-logo">出発<span>確認</span></div>
    <div class="hdr-right">
      <div class="hdr-avatar" id="avChar">?</div>
      <div class="hdr-name" id="hName"></div>
    </div>
  </div>

  <div class="body">
    <!-- ホーム（カレンダー） -->
    <div id="tHome" class="tab-content on">
      <div class="card" style="margin:12px 12px 10px;">
        <div class="cal-header">
          <button class="cal-nav" onclick="calPrev()">‹</button>
          <div class="cal-title" id="calTitle"></div>
          <button class="cal-nav" onclick="calNext()">›</button>
        </div>
        <div class="cal-views">
          <button class="cal-view on" id="viewToday" onclick="setCalView('today')">今日</button>
          <button class="cal-view" id="viewWeek" onclick="setCalView('week')">週</button>
          <button class="cal-view" id="viewMonth" onclick="setCalView('month')">月</button>
        </div>
        <div id="calBody"></div>
      </div>

      <!-- 今日の出発予定 -->
      <div class="sec">今日の出発予定</div>
      <div id="todayPlans">
        <div class="empty"><div class="empty-icon">📅</div><div class="empty-text">今日の出発予定はありません</div></div>
      </div>
    </div>

    <!-- チャット一覧 -->
    <div id="tChat" class="tab-content">
      <div id="chatList" class="chat-list"></div>
    </div>

    <!-- 設定 -->
    <div id="tSettings" class="tab-content">
      <div class="sec">プロフィール</div>
      <div class="settings-section">
        <div class="settings-item">
          <div class="settings-label">名前</div>
          <input class="settings-input" id="setName" type="text">
        </div>
        <div class="settings-item">
          <div class="settings-label">ユーザー名</div>
          <input class="settings-input" id="setUser" type="text">
        </div>
        <div class="settings-item">
          <div class="settings-label">メールアドレス</div>
          <input class="settings-input" id="setEmail" type="email">
        </div>
      </div>
      <div class="sec">パスワード変更</div>
      <div class="settings-section">
        <div class="settings-item">
          <div class="settings-label">新しいパスワード</div>
          <input class="settings-input" id="setNewPw" type="password" placeholder="6文字以上">
        </div>
      </div>
      <div style="padding:0 12px;margin-bottom:12px;">
        <button class="btn-primary" onclick="saveSettings()">💾 設定を保存</button>
      </div>

      <div class="sec">サウンド</div>
      <div class="settings-section">
        <div class="settings-item">
          <div class="settings-label">受信音</div>
          <select class="settings-select" id="setRecvSound" onchange="testSound('recv')">
            <option value="chime">チャイム</option>
            <option value="bell">ベル</option>
            <option value="pop">ポップ</option>
            <option value="ding">ディン</option>
            <option value="none">なし</option>
          </select>
        </div>
        <div class="settings-item">
          <div class="settings-label">アラーム音</div>

// ===== API =====
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2);}
function nowStr(){var d=new Date(Date.now()+9*60*60*1000);return d.toISOString().replace('T',' ').slice(0,19);}
function toJST(s){if(!s)return '';return s.replace('T',' ').slice(0,19);}
function toJSTShort(s){return toJST(s).slice(0,16);}
function toJSTTime(s){return toJST(s).slice(11,16);}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hashPw(pw){var h=0;for(var i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0;}return 'h'+Math.abs(h).toString(16)+pw.length;}

async function sb(method,table,body,query){
  var res=await fetch(SURL+'/rest/v1/'+table+(query||''),{
    method,headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''},
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok){var e=await res.text();throw new Error(e);}
  if(method==='DELETE')return [];
  var t=await res.text();return t?JSON.parse(t):[];
}
function sGet(t,q){return sb('GET',t,null,q);}
function sPost(t,b){return sb('POST',t,b,'');}
function sPatch(t,b,q){return sb('PATCH',t,b,q);}
function sDel(t,q){return sb('DELETE',t,null,q);}

// ===== カレンダー =====
var _calView='today';
var _calDate=new Date();
var _departurePlans={};

function setCalView(v){
  _calView=v;
  ['today','week','month'].forEach(function(k){
    document.getElementById('view'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('on',k===v);
  });
  renderCalendar();
}

function calPrev(){
  if(_calView==='month'){_calDate.setMonth(_calDate.getMonth()-1);}
  else{_calDate.setDate(_calDate.getDate()-(_calView==='week'?7:1));}
  renderCalendar();
}
function calNext(){
  if(_calView==='month'){_calDate.setMonth(_calDate.getMonth()+1);}
  else{_calDate.setDate(_calDate.getDate()+(_calView==='week'?7:1));}
  renderCalendar();
}

async function renderCalendar(){
  var today=new Date();
  var todayStr=today.toISOString().slice(0,10);

  // 出発予定を取得
  try{
    var from, to;
    if(_calView==='today'){
      from=_calDate.toISOString().slice(0,10);
      to=from;
    } else if(_calView==='week'){
      var d=new Date(_calDate);
      d.setDate(d.getDate()-d.getDay());
      from=d.toISOString().slice(0,10);
      var d2=new Date(d); d2.setDate(d2.getDate()+6);
      to=d2.toISOString().slice(0,10);
    } else {
      var d=new Date(_calDate.getFullYear(),_calDate.getMonth(),1);
      from=d.toISOString().slice(0,10);
      var d2=new Date(_calDate.getFullYear(),_calDate.getMonth()+1,0);
      to=d2.toISOString().slice(0,10);
    }
    var plans=await sGet('departure_plans','?sender_id=eq.'+me.id+'&date=gte.'+from+'&date=lte.'+to+'&select=date,departure_time,status');
    _departurePlans={};
    plans.forEach(function(p){
      if(!_departurePlans[p.date]) _departurePlans[p.date]=[];
      _departurePlans[p.date].push(p);
    });
  }catch(e){}

  var body=document.getElementById('calBody');

  if(_calView==='today'){
    var dateStr=_calDate.toISOString().slice(0,10);
    document.getElementById('calTitle').textContent=formatDate(_calDate);
    body.innerHTML='<div style="padding:0 12px 16px;">'
      +'<div style="padding:20px;background:var(--navy3);border-radius:12px;text-align:center;cursor:pointer;" onclick="openDeptModal(\''+dateStr+'\')">'
        +'<div style="font-size:48px;font-weight:900;color:var(--accent2);">'+_calDate.getDate()+'</div>'
        +'<div style="font-size:13px;color:var(--muted);">'+['日','月','火','水','木','金','土'][_calDate.getDay()]+'曜日</div>'
        +(_departurePlans[dateStr]?'<div style="margin-top:10px;font-size:12px;color:var(--yellow);">⏰ 出発予定あり</div>':'<div style="margin-top:10px;font-size:13px;color:var(--accent);">＋ 出発予定を追加</div>')
      +'</div>'
    +'</div>';
  } else if(_calView==='week'){
    var d=new Date(_calDate);
    d.setDate(d.getDate()-d.getDay());
    document.getElementById('calTitle').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月';
    var html='<div class="week-list">';
    var days=['日','月','火','水','木','金','土'];
    for(var i=0;i<7;i++){
      var dd=new Date(d); dd.setDate(d.getDate()+i);
      var ds=dd.toISOString().slice(0,10);
      var isToday=ds===todayStr;
      var plans=_departurePlans[ds]||[];
      html+='<div class="week-day" onclick="openDeptModal(\''+ds+'\')" style="'+(isToday?'border:1px solid var(--accent);':'')+'">'
        +'<div class="week-day-date"><div class="week-day-num" style="color:'+(isToday?'var(--accent2)':'var(--text)')+'">'+dd.getDate()+'</div><div class="week-day-label">'+days[dd.getDay()]+'</div></div>'
        +'<div class="week-day-info">'+(plans.length?plans.map(function(p){return '<div style="font-size:12px;color:var(--yellow);">⏰ '+p.departure_time.slice(0,5)+'</div>';}).join(''):'<div class="week-day-plans">出発予定なし</div>')+'</div>'
        +'<div style="color:var(--accent);font-size:18px;">+</div>'
      +'</div>';
    }
    html+='</div>';
    body.innerHTML=html;
  } else {
    var y=_calDate.getFullYear(), m=_calDate.getMonth();
    document.getElementById('calTitle').textContent=y+'年'+(m+1)+'月';
    var first=new Date(y,m,1).getDay();
    var last=new Date(y,m+1,0).getDate();
    var days=['日','月','火','水','木','金','土'];
    var html='<div class="cal-grid">';
    days.forEach(function(d){html+='<div class="cal-day-label">'+d+'</div>';});
    for(var i=0;i<first;i++) html+='<div class="cal-day empty"></div>';
    for(var d=1;d<=last;d++){
      var ds=y+'-'+(m+1<10?'0':'')+(m+1)+'-'+(d<10?'0':'')+d;
      var isToday=ds===todayStr;
      var hasPlan=!!_departurePlans[ds];
      html+='<div class="cal-day'+(isToday?' today':'')+(hasPlan?' has-plan':'')+'" onclick="openDeptModal(\''+ds+'\')">'+d+'</div>';
    }
    html+='</div>';
    body.innerHTML=html;
  }
}

function formatDate(d){
  var days=['日','月','火','水','木','金','土'];
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+days[d.getDay()]+'）';
}

async function saveDeparturePlan(){
  var time=document.getElementById('deptTime').value;
  if(!time){toast('⚠ 出発時刻を入力してください');return;}
  var checked=document.querySelectorAll('#deptMemberList input:checked');
  if(!checked.length){toast('⚠ 通知する相手を選んでください');return;}
  var targetIds=Array.from(checked).map(function(c){return c.value;});

  try{
    // 既存の予定を削除
    await sDel('departure_plans','?sender_id=eq.'+me.id+'&date=eq.'+_selectedDate);
    // 新規保存（相手ごと）
    for(var i=0;i<targetIds.length;i++){
      await sPost('departure_plans',{
        id:uid(), sender_id:me.id, receiver_id:targetIds[i],
        date:_selectedDate, departure_time:time+':00',
        status:'pending', created:nowStr()
      });
      // チャットに出発予定メッセージを送信
      await sPost('messages',{
        id:uid(), sender_id:me.id, receiver_id:targetIds[i],
        body:'【出発予定】'+_selectedDate+' '+time+' に出発予定です。\n時間内に出発報告がない場合は通知が届きます。',
        msg_type:'departure_plan',
        plan_date:_selectedDate, plan_time:time+':00',
        status:'sent', sent_at:nowStr()
      });
    }
    toast('✓ 出発予定を設定しました');
    closeDeptModal();
    renderCalendar();
    loadTodayPlans();
    loadChatList();
  }catch(e){toast('⚠ エラー: '+e.message);}
}

// ===== 今日の出発予定 =====
async function loadTodayPlans(){
  var today=new Date().toISOString().slice(0,10);
  try{
    // 自分が送信した予定
    var sent=await sGet('departure_plans','?sender_id=eq.'+me.id+'&date=eq.'+today+'&select=id,receiver_id,departure_time,status,reported_at');
    // 自分が受信した予定
    var recv=await sGet('departure_plans','?receiver_id=eq.'+me.id+'&date=eq.'+today+'&select=id,sender_id,departure_time,status,reported_at');

    var el=document.getElementById('todayPlans');
    if(!sent.length&&!recv.length){
      el.innerHTML='<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">今日の出発予定はありません</div></div>';
      return;
    }

    // ユーザー情報取得
    var ids=[...new Set([...sent.map(function(p){return p.receiver_id;}), ...recv.map(function(p){return p.sender_id;})])];
    var users={};
    if(ids.length){var us=await sGet('users','?id=in.('+ids.join(',')+')'+'&select=id,name');us.forEach(function(u){users[u.id]=u;});}

    var now=new Date();
    var nowMin=now.getHours()*60+now.getMinutes();

    var html='';
    sent.forEach(function(p){
      var name=users[p.receiver_id]?users[p.receiver_id].name:'?';
      var t=p.departure_time.slice(0,5);
      var parts=t.split(':');
      var dMin=parseInt(parts[0])*60+parseInt(parts[1]);
      var over=nowMin>dMin+5 && p.status==='pending';
      var statusClass=p.status==='departed'?'done':over?'missed':'pending';
      var statusLabel=p.status==='departed'?'出発済み':over?'未出発':'待機中';
      html+='<div class="card" style="margin:0 12px 8px;">'
        +'<div class="card-pad departure-card '+statusClass+'">'
          +'<div class="dc-header"><div class="dc-title">→ '+esc(name)+'へ通知</div><div class="dc-status '+statusClass+'">'+statusLabel+'</div></div>'
          +'<div class="dc-time">'+t+'</div>'
          +'<div class="dc-date">'+today+'</div>'
        +'</div>'
      +'</div>';
    });

    recv.forEach(function(p){
      var name=users[p.sender_id]?users[p.sender_id].name:'?';
      var t=p.departure_time.slice(0,5);
      var statusClass=p.status==='departed'?'done':'pending';
      html+='<div class="card" style="margin:0 12px 8px;">'
        +'<div class="card-pad departure-card '+statusClass+'">'
          +'<div class="dc-header"><div class="dc-title">'+esc(name)+'さんの出発予定</div><div class="dc-status '+statusClass+'">'+(p.status==='departed'?'出発済み':'待機中')+'</div></div>'
          +'<div class="dc-time">'+t+'</div>'
          +'<div class="dc-date">'+today+'</div>'
          +(p.status==='pending'?'<div class="dc-action"><button class="btn-depart" onclick="reportDeparted(\''+p.id+'\')">🚀 出発しました</button></div>':'')
        +'</div>'
      +'</div>';
    });

    el.innerHTML=html;
  }catch(e){console.log('plans error:',e);}
}

async function reportDeparted(planId){
  try{
    await sPatch('departure_plans',{status:'departed',reported_at:nowStr()},'?id=eq.'+planId);
    toast('✅ 出発を報告しました');
    loadTodayPlans();
  }catch(e){toast('⚠ エラー: '+e.message);}
}

  var el=document.getElementById('chatList');
  try{
    if(!follows.length){
      el.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">まだメンバーがいません<br>設定からメンバーを追加してください</div></div>';
      return;
    }
    var partners={};
    follows.forEach(function(u){partners[u.id]={user:u,last:'',preview:'',unread:0,mine:false};});
    var sent=[]; try{sent=await sGet('messages','?sender_id=eq.'+me.id+'&order=sent_at.desc&select=receiver_id,body,sent_at');}catch(e){}
    var recv=[]; try{recv=await sGet('messages','?receiver_id=eq.'+me.id+'&order=sent_at.desc&select=sender_id,body,sent_at,status');}catch(e){}
    sent.forEach(function(m){
      if(partners[m.receiver_id]&&(!partners[m.receiver_id].last||m.sent_at>partners[m.receiver_id].last))
        partners[m.receiver_id].last=m.sent_at,partners[m.receiver_id].preview=m.body,partners[m.receiver_id].mine=true;
    });
    recv.forEach(function(m){
      if(partners[m.sender_id]){
        if(!partners[m.sender_id].last||m.sent_at>partners[m.sender_id].last)
          partners[m.sender_id].last=m.sent_at,partners[m.sender_id].preview=m.body,partners[m.sender_id].mine=false;
        if(m.status==='sent') partners[m.sender_id].unread=(partners[m.sender_id].unread||0)+1;
      }
    });
    var sorted=Object.keys(partners).sort(function(a,b){
      var la=partners[a].last||'',lb=partners[b].last||'';return lb>la?1:-1;
    });
    var totalUnread=0;
    var html=sorted.map(function(uid){
      var p=partners[uid];var u=p.user;
      totalUnread+=p.unread||0;
      var preview=p.preview?(p.mine?'あなた: ':'')+p.preview.slice(0,28):'タップしてトークを開始';
      return '<div class="chat-item" onclick="openChat(\''+uid+'\')">'
        +'<div class="chat-avatar">'+esc(u.name[0])+'</div>'
        +'<div class="chat-info">'
          +'<div class="chat-name">'+esc(u.name)+'</div>'
          +'<div class="chat-preview">'+esc(preview)+'</div>'
        +'</div>'
        +'<div class="chat-meta">'
          +(p.last?'<div class="chat-time">'+toJSTShort(p.last).slice(5,16)+'</div>':'')
          +(p.unread?'<div class="chat-badge">'+p.unread+'</div>':'')
        +'</div>'
      +'</div>';
    }).join('');
    el.innerHTML=html;
    var badge=document.getElementById('chatBadge');
    if(totalUnread>0){badge.textContent=totalUnread;badge.style.display='flex';}
    else{badge.style.display='none';}
  }catch(e){
    console.log('chatList error:',e);
    if(follows.length){
      el.innerHTML=follows.map(function(u){
        return '<div class="chat-item" onclick="openChat(\''+u.id+'\')">'
          +'<div class="chat-avatar">'+esc(u.name[0])+'</div>'
          +'<div class="chat-info"><div class="chat-name">'+esc(u.name)+'</div><div class="chat-preview">タップしてトークを開始</div></div>'
        +'</div>';
      }).join('');
    }else{
      el.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">メンバーがいません</div></div>';
    }
  }
}

async function openChat(userId){
  _currentChatUser=userId;
  try{
    var users=await sGet('users','?id=eq.'+userId+'&select=id,name,username');
    var u=users[0]||{name:'?',username:'?'};
    document.getElementById('chatDetailAvatar').textContent=u.name[0];
    document.getElementById('chatDetailName').textContent=u.name;
    document.getElementById('chatDetailStatus').textContent='@'+(u.username||'?');
    document.getElementById('chatDetail').style.display='flex';
    await loadChatMsgs(userId);
    // 既読にする
    await sPatch('messages',{status:'read'},'?sender_id=eq.'+userId+'&receiver_id=eq.'+me.id+'&status=eq.sent');
    loadChatList();
  }catch(e){toast('⚠ エラー: '+e.message);}
}

function closeChat(){
  document.getElementById('chatDetail').style.display='none';
  _currentChatUser=null;
  loadChatList();
}

async function loadChatMsgs(userId){
  var el=document.getElementById('chatMsgs');
  try{
    var msgs=await sGet('messages',
      '?or=(and(sender_id.eq.'+me.id+',receiver_id.eq.'+userId+'),and(sender_id.eq.'+userId+',receiver_id.eq.'+me.id+'))&order=sent_at.asc'
    );
    if(!msgs.length){el.innerHTML='<div class="empty"><div class="empty-icon">💬</div><div class="empty-text">まだメッセージがありません</div></div>';return;}

    var html=msgs.map(function(m){
      var mine=m.sender_id===me.id;
      if(m.msg_type==='departure_plan'){
        var status='pending';
        var statusLabel='待機中';
        var statusClass='pending';
        // 出発カード
        return '<div class="msg-row system-row">'
          +'<div style="width:90%;">'
            +'<div class="departure-card '+statusClass+'">'
              +'<div class="dc-header">'
                +'<div class="dc-title">📅 出発予定</div>'
                +'<div class="dc-status '+statusClass+'">'+statusLabel+'</div>'
              +'</div>'
              +'<div class="dc-time">'+(m.plan_time||'').slice(0,5)+'</div>'
              +'<div class="dc-date">'+(m.plan_date||'')+'</div>'
            +'</div>'
          +'</div>'
        +'</div>';
      }
      return '<div class="msg-row '+(mine?'mine':'')+'">'
        +(mine?'':'<div class="msg-avatar">'+esc((userId+'')[0])+'</div>')
        +'<div>'
          +'<div class="msg-bubble '+(mine?'mine':'theirs')+'">'+esc(m.body).replace(/\n/g,'<br>')+'</div>'
        +'</div>'
        +'<div class="msg-time">'+toJSTTime(m.sent_at)+'</div>'
      +'</div>';
    }).join('');
    el.innerHTML=html;
    el.scrollTop=el.scrollHeight;
  }catch(e){console.log('msgs error:',e);}
}

async function sendChatMsg(){
  var input=document.getElementById('chatInputText');
  var body=input.value.trim();
  if(!body||!_currentChatUser)return;
  try{
    await sPost('messages',{id:uid(),sender_id:me.id,receiver_id:_currentChatUser,body:body,msg_type:'text',status:'sent',sent_at:nowStr()});
    input.value='';
    input.style.height='auto';
    await loadChatMsgs(_currentChatUser);
    loadChatList();
  }catch(e){toast('⚠ エラー: '+e.message);}
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
}

// ===== 設定 =====
async function saveSettings(){
  var name=document.getElementById('setName').value.trim();
  var uname=document.getElementById('setUser').value.trim();
  var email=document.getElementById('setEmail').value.trim();
  var newpw=document.getElementById('setNewPw').value;
  var update={name:name,username:uname,email:email};
  if(newpw){if(newpw.length<6){toast('⚠ パスワードは6文字以上');return;}update.password=hashPw(newpw);}
  try{
    await sPatch('users',update,'?id=eq.'+me.id);
    Object.assign(me,update);
    localStorage.setItem('dp_u',JSON.stringify(me));
    document.getElementById('hName').textContent='@'+(me.username||me.name);
    document.getElementById('avChar').textContent=me.name[0];
    sndSettings.recv=document.getElementById('setRecvSound').value;
    sndSettings.alarm=document.getElementById('setAlarmSound').value;
    localStorage.setItem('dp_sounds',JSON.stringify(sndSettings));
    toast('✅ 設定を保存しました');
  }catch(e){toast('⚠ エラー: '+e.message);}

// ===== サウンド =====
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
document.addEventListener('touchstart',function(){if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();},{passive:true});
document.addEventListener('click',function(){if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();},{passive:true});

function playSound(type,vol){
  if(type==='none')return;
  var v=(vol||80)/100;
  try{
    var ctx=getCtx();var now=ctx.currentTime;
    function o(f,w,t,d,g){var os=ctx.createOscillator(),gn=ctx.createGain();os.connect(gn);gn.connect(ctx.destination);os.type=w||'sine';os.frequency.value=f;gn.gain.setValueAtTime(g||v,t);gn.gain.exponentialRampToValueAtTime(0.001,t+d);os.start(t);os.stop(t+d+0.02);}
    if(type==='chime'){[[523,0],[659,.18],[784,.36]].forEach(function(p){o(p[0],'sine',now+p[1],.7,v*.7);});}
    else if(type==='bell'){o(880,'sine',now,1.5,v);o(1760,'sine',now,.8,v*.3);}
    else if(type==='pop'){var os=ctx.createOscillator(),gn=ctx.createGain();os.connect(gn);gn.connect(ctx.destination);os.type='sine';os.frequency.setValueAtTime(900,now);os.frequency.exponentialRampToValueAtTime(300,now+.12);gn.gain.setValueAtTime(v,now);gn.gain.exponentialRampToValueAtTime(.001,now+.12);os.start(now);os.stop(now+.15);}
    else if(type==='ding'){o(1047,'sine',now,.8,v*.9);o(1319,'sine',now+.2,.8,v*.9);}
    else if(type==='alarm'){for(var i=0;i<6;i++)o(880,'sawtooth',now+i*.35,.3,v*.9);}
    else if(type==='siren'){var os=ctx.createOscillator(),gn=ctx.createGain();os.connect(gn);gn.connect(ctx.destination);os.type='sawtooth';os.frequency.setValueAtTime(440,now);os.frequency.linearRampToValueAtTime(880,now+.6);os.frequency.linearRampToValueAtTime(440,now+1.2);os.frequency.linearRampToValueAtTime(880,now+1.8);os.frequency.linearRampToValueAtTime(440,now+2.4);gn.gain.setValueAtTime(v,now);os.start(now);os.stop(now+2.4);}
    else if(type==='urgent'){for(var i=0;i<10;i++)o(i%2===0?1200:900,'square',now+i*.18,.16,v*.7);}
    else if(type==='beep'){for(var i=0;i<3;i++)o(1000,'sine',now+i*.35,.2,v);}
  }catch(e){}
}

function testSound(type){
  var val=document.getElementById(type==='recv'?'setRecvSound':'setAlarmSound').value;
  playSound(val,80);
}

// ===== アラーム =====
function showAlarm(name,time,planId){
  if(seenAlarms.indexOf(planId)>=0) return;
  seenAlarms.push(planId);
  localStorage.setItem('dp_seen_alarms',JSON.stringify(seenAlarms));
  document.getElementById('alarmName').textContent=name+'さん';
  document.getElementById('alarmDesc').textContent=time+' の出発時刻を過ぎても\n出発報告がありません。';
  document.getElementById('alarmOv').classList.add('on');
  if(_alarmInterval) clearInterval(_alarmInterval);
  _alarmInterval=setInterval(function(){playSound(sndSettings.alarm||'alarm',100);},3000);
  playSound(sndSettings.alarm||'alarm',100);
  if(Notification&&Notification.permission==='granted'){
    new Notification('🚨 未出発アラーム',{body:name+'さんが'+time+'までに出発報告をしていません！',requireInteraction:true});
  }
}

function closeAlarm(action){
  if(_alarmInterval){clearInterval(_alarmInterval);_alarmInterval=null;}
  document.getElementById('alarmOv').classList.remove('on');
  if(action==='contact'&&_currentAlarmUser){
    openChat(_currentAlarmUser);
    goTab('Chat');
  }
}
var _currentAlarmUser=null;

// ===== ポーリング =====
async function checkAlarms(){
  if(!me) return;
  var today=new Date().toISOString().slice(0,10);
  var now=new Date();
  var nowMin=now.getHours()*60+now.getMinutes();
  try{
    var plans=await sGet('departure_plans','?sender_id=eq.'+me.id+'&date=eq.'+today+'&status=eq.pending&select=id,receiver_id,departure_time');
    plans.forEach(function(p){
      var t=p.departure_time.slice(0,5).split(':');
      var dMin=parseInt(t[0])*60+parseInt(t[1]);
      // 出発時刻+5分を過ぎたらアラーム
      if(nowMin>dMin+5 && seenAlarms.indexOf(p.id)<0){
        sGet('users','?id=eq.'+p.receiver_id+'&select=name').then(function(users){
          if(users.length){
            _currentAlarmUser=p.receiver_id;
            showAlarm(users[0].name,p.departure_time.slice(0,5),p.id);
            // no_replyに更新
            sPatch('departure_plans',{status:'missed'},'?id=eq.'+p.id).catch(function(){});
          }
        }).catch(function(){});
      }
    });
    // 受信した出発予定の更新をチェック
    loadTodayPlans();
  }catch(e){}
}

function startPolling(){
  setInterval(function(){
    if(!me) return;
    checkAlarms();
    if(_currentChatUser) loadChatMsgs(_currentChatUser);
    loadChatList();
  }, 8000);
  // visibilitychange対応
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='visible'&&me){checkAlarms();loadChatList();}
  });
}

  // メンバー追加機能（設定に追加）
  var settingsEl=document.getElementById('tSettings');
  var memberHtml='<div class="sec">メンバー追加</div>'
    +'<div class="settings-section">'
      +'<div class="settings-item" style="flex-direction:column;align-items:flex-start;gap:10px;">'
        +'<div class="settings-label">メールアドレスで検索</div>'
        +'<div style="display:flex;gap:8px;width:100%;">'

        +'</div>'
        +'<div id="searchMemberResult"></div>'

    +'</div>'

async function searchMember(){
  var email=document.getElementById('searchMemberEmail').value.trim().toLowerCase();
  if(!email){toast('⚠ メールアドレスを入力してください');return;}
  var el=document.getElementById('searchMemberResult');
  el.innerHTML='<div style="font-size:13px;color:var(--muted);">検索中...</div>';
  try{
    var rows=await sGet('users','?email=eq.'+encodeURIComponent(email)+'&select=id,name,username');
    if(!rows.length){el.innerHTML='<div style="font-size:13px;color:var(--muted);">見つかりませんでした</div>';return;}
    var u=rows[0];
    if(u.id===me.id){el.innerHTML='<div style="font-size:13px;color:var(--muted);">自分自身です</div>';return;}
    var already=follows.find(function(f){return f.id===u.id;});
    el.innerHTML='<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--navy3);border-radius:10px;">'
      +'<div style="width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;">'+esc(u.name[0])+'</div>'
      +'<div style="flex:1;"><div style="font-size:14px;font-weight:700;">'+esc(u.name)+'</div><div style="font-size:11px;color:var(--muted);">@'+esc(u.username||'?')+'</div></div>'
      +(already
        ?'<span style="font-size:12px;color:var(--green);">✓ 追加済み</span>'
        :'<button onclick="addMember(\''+u.id+'\')" style="padding:6px 12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">追加</button>'
      )
    +'</div>';
  }catch(e){el.innerHTML='<div style="font-size:13px;color:var(--red);">エラーが発生しました</div>';}
}

async function addMember(userId){
  try{
    await sPost('connections',{id:uid(),user_a:me.id,user_b:userId,created:nowStr()});
    await loadFollows();
    renderMemberList();
    document.getElementById('searchMemberResult').innerHTML='';
    document.getElementById('searchMemberEmail').value='';
    toast('✅ メンバーを追加しました');
  }catch(e){toast('⚠ エラー: '+e.message);}
}

function renderMemberList(){
  var el=document.getElementById('memberListEl');
  if(!el)return;
  if(!follows.length){el.innerHTML='<div class="empty" style="padding:20px;"><div class="empty-text">まだメンバーがいません</div></div>';return;}
  el.innerHTML=follows.map(function(u){
    return '<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);">'
      +'<div style="width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;">'+esc(u.name[0])+'</div>'
      +'<div style="flex:1;"><div style="font-size:14px;font-weight:700;">'+esc(u.name)+'</div><div style="font-size:11px;color:var(--muted);">@'+esc(u.username||'?')+'</div></div>'
      +'<button onclick="removeMember(\''+u.id+'\')" style="padding:5px 8px;background:transparent;border:1px solid rgba(239,68,68,.3);border-radius:8px;color:var(--red);font-size:11px;cursor:pointer;">削除</button>'
    +'</div>';
  }).join('');
}

async function removeMember(userId){
  if(!confirm('このメンバーを削除しますか？'))return;
  try{
    await sDel('connections','?user_a=eq.'+me.id+'&user_b=eq.'+userId);
    await loadFollows();
    renderMemberList();
    toast('✓ メンバーを削除しました');
  }catch(e){toast('⚠ エラー: '+e.message);}
}

// 設定タブ表示時にメンバー一覧を更新
var _origGoTab=goTab;
function goTab(name){
  ['Home','Chat','Settings'].forEach(function(t){
    document.getElementById('t'+t).classList.toggle('on',t===name);
    document.getElementById('nb'+t).classList.toggle('on',t===name);
  });
  if(name==='Chat')loadChatList();
  if(name==='Home'){renderCalendar();loadTodayPlans();}
  if(name==='Settings')renderMemberList();
}
